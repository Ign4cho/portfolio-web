<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a0d2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="166" x2="800" y2="166" stroke="#ffffff05" stroke-width="1"/>
  <line x1="0" y1="332" x2="800" y2="332" stroke="#ffffff05" stroke-width="1"/>
  <line x1="266" y1="0" x2="266" y2="500" stroke="#ffffff05" stroke-width="1"/>
  <line x1="533" y1="0" x2="533" y2="500" stroke="#ffffff05" stroke-width="1"/>

  <!-- Glow circle behind text -->
  <circle cx="400" cy="230" r="180" fill="#a476ff" opacity="0.05"/>
  <circle cx="400" cy="230" r="120" fill="#a476ff" opacity="0.05"/>

  <!-- Brand name -->
  <text
    x="400" y="185"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="42"
    font-weight="700"
    fill="#dfdfdf"
    text-anchor="middle"
    letter-spacing="2"
  >espacioamine</text>
  <text
    x="400" y="215"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="16"
    fill="#a476ff"
    text-anchor="middle"
    letter-spacing="6"
  >.com</text>

  <!-- Divider line -->
  <line x1="300" y1="240" x2="500" y2="240" stroke="#a476ff" stroke-width="1" opacity="0.4"/>

  <!-- Coming Soon text -->
  <text
    x="400" y="295"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="28"
    font-weight="300"
    fill="#dfdfdf"
    text-anchor="middle"
    letter-spacing="10"
    opacity="0.9"
  >COMING SOON</text>

  <!-- Subtitle -->
  <text
    x="400" y="335"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="13"
    fill="#80809a"
    text-anchor="middle"
    letter-spacing="1"
  >Agencia de Marketing Digital · Próximamente</text>

  <!-- Dots decoration -->
  <circle cx="355" cy="378" r="3" fill="#a476ff" opacity="0.5"/>
  <circle cx="375" cy="378" r="3" fill="#a476ff" opacity="0.7"/>
  <circle cx="395" cy="378" r="3" fill="#a476ff" opacity="0.9"/>
  <circle cx="415" cy="378" r="3" fill="#a476ff" opacity="0.7"/>
  <circle cx="435" cy="378" r="3" fill="#a476ff" opacity="0.5"/>
</svg>
